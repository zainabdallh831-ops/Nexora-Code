<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Book Store</title>

    <link rel="stylesheet" href="style2.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body style=" background:#f5f3ef;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;">

<div class="login-container">

    <div class="left-side">

        <h1>Welcome Back!</h1>

        <p>
            Continue your learning journey with thousands of books and
            courses designed for your future.
        </p>

        <i class="fa-solid fa-book-open-reader"></i>

    </div>

    <div class="right-side">

        <h2>Sign In</h2>

        <form>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Email Address" id="sign-email">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password" id="sign-pass">
            </div>

            <div class="options">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button type="button" id="sign-btn" onclick="signInBtn()">
                Sign In
            </button>

            <p id="err-msg">

            </p>

        </form>

        <p class="signup">
            Don't have an account?
            <a href="create.html">Create Account</a>
        </p>

    </div>

</div>
<script src="type.js" defer></script>
</body>
</html>
